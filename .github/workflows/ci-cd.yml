name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-frontend:
    name: Build Frontend (React/Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: client

      - name: Build Frontend
        run: npm run build
        working-directory: client

  build-backend:
    name: Build & Verify Backend (Express)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install Backend Dependencies
        run: npm ci
        working-directory: server

  deploy:
    name: Deploy to AWS (Future Setup)
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Ready for AWS Deployment
        run: |
          echo "CI/CD build steps passed successfully!"
          echo "To enable AWS deployment, uncomment the deployment steps in .github/workflows/ci-cd.yml and add your credentials to GitHub Secrets."

      # Example 1: Deploy Frontend to AWS S3 (Uncomment and configure when ready)
